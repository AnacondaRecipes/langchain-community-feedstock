{% set name = "langchain-community" %}
{% set version = "0.3.30" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: df68fbde7f7fa5142ab93b0cbc104916b12ab4163e200edd933ee93e67956ee9

build:
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pip
    - pdm-backend
  run:
    - python
    - langchain >=0.3.27,<2.0.0
    - langchain-core >=0.3.75,<2.0.0
    - sqlalchemy >=1.4.0,<3.0.0
    - requests >=2.32.5,<3.0.0
    - pyyaml >=5.3.0,<7.0.0
    - aiohttp >=3.8.3,<4.0.0
    - tenacity !=8.4.0,>=8.1.0,<10.0.0
    - dataclasses-json >=0.6.7,<0.7.0
    - pydantic-settings >=2.10.1,<3.0.0
    - langsmith >=0.1.125,<1.0.0
    - httpx-sse >=0.4.0,<1.0.0
    - numpy >=1.26.2  # [py<313]
    - numpy >=2.1.0  # [py>=313]

test:
  imports:
    - langchain_community
    - langchain_community.adapters
    - langchain_community.agent_toolkits
    - langchain_community.agents
    - langchain_community.cache
    - langchain_community.callbacks
    - langchain_community.chains
    - langchain_community.chat_loaders
    - langchain_community.chat_message_histories
    - langchain_community.chat_models
    - langchain_community.cross_encoders
    - langchain_community.docstore
    - langchain_community.document_compressors
    - langchain_community.document_loaders
    - langchain_community.document_transformers
    - langchain_community.embeddings
    - langchain_community.example_selectors
    - langchain_community.graph_vectorstores
    - langchain_community.graphs
    - langchain_community.indexes
    - langchain_community.llms
    - langchain_community.output_parsers
    - langchain_community.query_constructors
    - langchain_community.retrievers
    - langchain_community.storage
    - langchain_community.tools
    - langchain_community.utilities
    - langchain_community.utils
    - langchain_community.vectorstores
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    # Upstream tests failed due to missing langchain_tests/blockbuster/stackapi/serpapi/arxiv
  requires:
    - pip

about:
  home: https://github.com/langchain-ai/langchain
  summary: Community contributed LangChain integrations.
  description: Community contributed LangChain integrations.
  doc_url: https://api.python.langchain.com/en/stable/community_api_reference.html
  dev_url: https://github.com/langchain-ai/langchain
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pavelzw
    - hinthornw
    - baskaryan
    - hwchase17
    - efriis
    - agola11